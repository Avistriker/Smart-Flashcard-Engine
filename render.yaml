services:
  - type: web
    name: smart-flashcard-engine
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RENDER
        value: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
